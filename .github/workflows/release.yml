name: Build release binaries

on:
  release:
    types: [created]

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
            bun_arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
            bun_arch: x64
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install bun (for sidecar dependency install)
        uses: oven-sh/setup-bun@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Assemble .app bundle
        run: ./scripts/build-app.sh ${{ matrix.target }} ${{ matrix.arch }}

      - name: Create DMG
        run: |
          brew install create-dmg
          ./scripts/create-dmg.sh ${{ matrix.arch }}

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp target/${{ matrix.target }}/release/slashpad slashpad-darwin-${{ matrix.arch }}
          gh release upload "${{ github.event.release.tag_name }}" \
            slashpad-darwin-${{ matrix.arch }} \
            build/Slashpad-darwin-${{ matrix.arch }}.zip \
            build/Slashpad-darwin-${{ matrix.arch }}.dmg \
            --clobber
